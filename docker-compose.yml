version: "3.9"

services:
  app:
    build: .
    container_name: jobryn_backend
    command: gunicorn jobrynbackend.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 3

    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media

    env_file:
      - .env

    ports:
      - "8000"

    restart: always

volumes:
  static_volume:
  media_volume: