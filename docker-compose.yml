version: "3.9"

services:
  app:
    build: .
    container_name: jobryn_backend

    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media

    env_file:
      - .env

    ports:
      - "8000:8000"   # FIXED

    restart: always

volumes:
  static_volume:
  media_volume: